<!DOCTYPE html>
<!--
  TEMPLATE — Mastery dashboard. Generic across subjects.
  On bootstrap, copy this to <workspace>/reference/my-learning.html and replace
  the [SUBJECT] placeholders below (title + page-tag). Everything else is driven
  by the server (GET /api/progress) and needs no edits.
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Aprendizado — [SUBJECT]</title>
  <style>
    :root {
      --ink: #1a1a1a; --muted: #6b7280; --rule: #e5e7eb;
      --accent: #2563eb; --correct: #16a34a; --warn: #d97706;
      --surface: #f9fafb; --highlight: #eff6ff;
      --tag-ai: #dbeafe; --tag-ai-text: #1d4ed8;
      --tag-conv: #dcfce7; --tag-conv-text: #15803d;
      --tag-due: #fee2e2; --tag-due-text: #dc2626;
      font-size: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           color: var(--ink); background: #fff; max-width: 820px;
           margin: 0 auto; padding: 2.5rem 1.5rem 5rem; }

    /* ── header ── */
    header { border-bottom: 1px solid var(--rule); padding-bottom: 1.25rem; margin-bottom: 1.75rem; }
    .header-row { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: .5rem; }
    .page-tag { font-size: .72rem; letter-spacing: .1em; text-transform: uppercase;
                color: var(--muted); font-family: monospace; }
    h1 { font-size: 1.7rem; font-weight: 600; margin-top: .3rem; }
    .last-updated { font-size: .8rem; color: var(--muted); white-space: nowrap; }
    .btn-refresh { padding: .35rem .8rem; font-size: .78rem; border: 1px solid var(--rule);
      border-radius: 5px; background: #fff; cursor: pointer; color: var(--muted);
      font-family: inherit; transition: all .15s; }
    .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

    /* ── offline banner ── */
    .offline-banner { display: none; background: #fef3c7; border: 1px solid #f59e0b;
      border-radius: 6px; padding: .65rem 1rem; margin-bottom: 1.25rem; font-size: .85rem; color: #92400e; }
    .offline-banner code { background: #fde68a; padding: .1em .35em; border-radius: 3px; font-size: .82rem; }

    /* ── summary pills ── */
    .summary-row { display: flex; gap: .75rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .pill { padding: .6rem 1.1rem; border-radius: 8px; border: 1px solid var(--rule);
      display: flex; flex-direction: column; align-items: center; min-width: 120px; }
    .pill-num { font-size: 1.8rem; font-weight: 700; line-height: 1.1; }
    .pill-label { font-size: .72rem; text-transform: uppercase; letter-spacing: .06em;
      color: var(--muted); margin-top: .2rem; }
    .pill-mastered { background: #f0fdf4; border-color: #86efac; }
    .pill-mastered .pill-num { color: var(--correct); }
    .pill-due { background: #fef2f2; border-color: #fca5a5; }
    .pill-due .pill-num { color: #dc2626; }
    .pill-lessons { background: var(--highlight); border-color: #93c5fd; }
    .pill-lessons .pill-num { color: var(--accent); }

    /* ── sections ── */
    .section { margin-bottom: 2.5rem; }
    .section-title { font-size: .72rem; font-family: monospace; text-transform: uppercase;
      letter-spacing: .1em; color: var(--muted); margin-bottom: 1rem;
      padding-bottom: .4rem; border-bottom: 1px solid var(--rule); }

    /* ── review timeline ── */
    .review-list { display: flex; flex-direction: column; gap: .5rem; }
    .review-item { display: flex; align-items: center; gap: .9rem; padding: .75rem 1rem;
      border: 1px solid var(--rule); border-radius: 8px; background: var(--surface);
      transition: border-color .15s; }
    .review-item:hover { border-color: #93c5fd; }
    .review-item.due-today { border-color: #fca5a5; background: #fef2f2; }
    .days-badge { font-family: monospace; font-size: .78rem; font-weight: 700;
      min-width: 54px; text-align: center; padding: .25rem .5rem; border-radius: 5px; flex-shrink: 0; }
    .days-badge.today { background: var(--tag-due); color: var(--tag-due-text); }
    .days-badge.soon  { background: #fef9c3; color: #854d0e; }
    .days-badge.later { background: var(--tag-ai); color: var(--tag-ai-text); }
    .review-concept { font-weight: 500; font-size: .92rem; flex: 1; }
    .review-meta { font-size: .78rem; color: var(--muted); white-space: nowrap; }
    .source-tag { display: inline-block; font-size: .68rem; padding: .15rem .45rem;
      border-radius: 4px; font-family: monospace; margin-left: .5rem; }
    .tag-ai   { background: var(--tag-ai);   color: var(--tag-ai-text); }
    .tag-conv { background: var(--tag-conv);  color: var(--tag-conv-text); }

    /* ── concepts grid ── */
    .concepts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 1rem; }
    .concept-card { border: 1px solid var(--rule); border-radius: 10px;
      padding: 1rem 1.1rem; background: var(--surface); }
    .concept-card:hover { border-color: #93c5fd; }
    .concept-name { font-weight: 600; font-size: .95rem; margin-bottom: .5rem;
      text-transform: capitalize; }
    .concept-tags { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: .75rem; }
    .sparkline-wrap { margin: .5rem 0; }
    .concept-footer { font-size: .75rem; color: var(--muted); margin-top: .5rem; }
    .ease-bar-wrap { background: var(--rule); border-radius: 3px; height: 4px; margin-top: .35rem; }
    .ease-bar { height: 100%; border-radius: 3px; background: var(--accent); }

    /* ── lesson history ── */
    .lesson-table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    .lesson-table th { text-align: left; font-size: .72rem; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted); padding: .5rem .75rem;
      border-bottom: 1px solid var(--rule); font-weight: 500; }
    .lesson-table td { padding: .65rem .75rem; border-bottom: 1px solid var(--rule);
      vertical-align: middle; }
    .lesson-table tr:last-child td { border-bottom: none; }
    .lesson-table tr:hover td { background: var(--surface); }
    .score-cell { display: flex; align-items: center; gap: .75rem; }
    .mini-bar-wrap { background: var(--rule); border-radius: 3px; height: 6px; width: 90px; flex-shrink: 0; }
    .mini-bar { height: 100%; border-radius: 3px; }
    .score-num { font-family: monospace; font-weight: 600; font-size: .88rem; }
    .lesson-name { font-family: monospace; font-size: .83rem; color: var(--ink); }
    .date-cell { color: var(--muted); font-size: .82rem; white-space: nowrap; }

    /* ── empty states ── */
    .empty { color: var(--muted); font-size: .88rem; font-style: italic;
      padding: 1.25rem; background: var(--surface); border-radius: 8px;
      text-align: center; border: 1px dashed var(--rule); }

    /* ── skeleton loader ── */
    .skeleton { animation: pulse 1.5s ease-in-out infinite; background: #e5e7eb;
      border-radius: 6px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── footer ── */
    footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid var(--rule);
      font-size: .8rem; color: var(--muted); display: flex; justify-content: space-between;
      flex-wrap: wrap; gap: .5rem; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <div class="page-tag">[SUBJECT] · Dashboard</div>
      <h1>Meu Aprendizado</h1>
    </div>
    <div style="display:flex;align-items:center;gap:.75rem">
      <span class="last-updated" id="last-updated">—</span>
      <button class="btn-refresh" onclick="load()">↻ Atualizar</button>
    </div>
  </div>
</header>

<div class="offline-banner" id="offline-banner">
  ⚠️ Servidor offline — não foi possível carregar os dados.
  Inicie o servidor com <code>npm start</code> em <code>skill/server/</code> e atualize.
</div>

<!-- summary pills -->
<div class="summary-row" id="summary-row">
  <div class="pill skeleton" style="height:74px;width:120px"></div>
  <div class="pill skeleton" style="height:74px;width:120px"></div>
  <div class="pill skeleton" style="height:74px;width:120px"></div>
</div>

<!-- próximas revisões -->
<div class="section" id="section-reviews">
  <div class="section-title">Próximas revisões</div>
  <div id="reviews-content"><div class="pill skeleton" style="height:54px;width:100%"></div></div>
</div>

<!-- conceitos -->
<div class="section" id="section-concepts">
  <div class="section-title">Conceitos dominados</div>
  <div id="concepts-content">
    <div class="concepts-grid">
      <div class="pill skeleton" style="height:130px"></div>
      <div class="pill skeleton" style="height:130px"></div>
      <div class="pill skeleton" style="height:130px"></div>
    </div>
  </div>
</div>

<!-- histórico de lições -->
<div class="section" id="section-lessons">
  <div class="section-title">Histórico de lições</div>
  <div id="lessons-content"><div class="pill skeleton" style="height:60px;width:100%"></div></div>
</div>

<footer>
  <span>Dados em tempo real via <code>localhost:9990/api/progress</code></span>
  <span><a href="glossary.html">Glossário</a></span>
</footer>

<script>
  const SERVER = 'http://localhost:9990';

  // ── helpers ────────────────────────────────────────────────────────
  function pretty(conceptId) {
    return conceptId.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  function daysFromNow(dateStr) {
    const diff = new Date(dateStr) - new Date();
    return Math.round(diff / 86400000);
  }

  function formatDate(dateStr) {
    return new Date(dateStr).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function scoreColor(s) {
    if (s >= 80) return '#16a34a';
    if (s >= 50) return '#d97706';
    return '#dc2626';
  }

  // ── sparkline SVG ─────────────────────────────────────────────────
  function sparkline(history) {
    if (!history || history.length === 0) return '';
    const W = 120, H = 28, pad = 3;
    const scores = history.map(h => h.score);
    const step = scores.length < 2 ? W : (W - pad * 2) / (scores.length - 1);
    const points = scores.map((s, i) =>
      `${pad + i * step},${H - pad - ((s / 100) * (H - pad * 2))}`
    ).join(' ');
    const last = scores[scores.length - 1];
    const [lx, ly] = points.split(' ').pop().split(',');
    return `
      <svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">
        <polyline points="${points}" fill="none" stroke="${scoreColor(last)}" stroke-width="1.8"
          stroke-linejoin="round" stroke-linecap="round" opacity=".7"/>
        <circle cx="${lx}" cy="${ly}" r="2.5" fill="${scoreColor(last)}"/>
      </svg>`;
  }

  // ── render summary ────────────────────────────────────────────────
  function renderSummary(data) {
    const mastered = data.concepts.filter(c => c.mastered).length;
    const dueToday = data.concepts.filter(c => daysFromNow(c.next_review) <= 0).length;
    const lessons  = data.lessons.length;

    document.getElementById('summary-row').innerHTML = `
      <div class="pill pill-mastered">
        <span class="pill-num">${mastered}</span>
        <span class="pill-label">Dominados</span>
      </div>
      <div class="pill pill-due">
        <span class="pill-num">${dueToday}</span>
        <span class="pill-label">Para revisar hoje</span>
      </div>
      <div class="pill pill-lessons">
        <span class="pill-num">${lessons}</span>
        <span class="pill-label">Lições</span>
      </div>`;
  }

  // ── render reviews ────────────────────────────────────────────────
  function renderReviews(concepts) {
    const sorted = [...concepts].sort((a, b) => new Date(a.next_review) - new Date(b.next_review));

    if (sorted.length === 0) {
      document.getElementById('reviews-content').innerHTML =
        '<div class="empty">Nenhuma revisão agendada ainda.</div>';
      return;
    }

    const rows = sorted.map(c => {
      const days = daysFromNow(c.next_review);
      let cls = days <= 0 ? 'today' : days <= 3 ? 'soon' : 'later';
      let label = days <= 0 ? 'Hoje' : days === 1 ? 'Amanhã' : `+${days}d`;
      let itemCls = days <= 0 ? 'review-item due-today' : 'review-item';
      const sourceTag = c.mastery_source === 'conversation'
        ? '<span class="source-tag tag-conv">conversa</span>'
        : '<span class="source-tag tag-ai">IA</span>';
      return `
        <div class="${itemCls}">
          <span class="days-badge ${cls}">${label}</span>
          <span class="review-concept">${pretty(c.concept_id)}${sourceTag}</span>
          <span class="review-meta">${formatDate(c.next_review)} · intervalo ${c.interval_days}d</span>
        </div>`;
    }).join('');

    document.getElementById('reviews-content').innerHTML =
      `<div class="review-list">${rows}</div>`;
  }

  // ── render concepts ───────────────────────────────────────────────
  function renderConcepts(concepts) {
    if (concepts.length === 0) {
      document.getElementById('concepts-content').innerHTML =
        '<div class="empty">Nenhum conceito dominado ainda — complete uma lição.</div>';
      return;
    }

    const cards = concepts.map(c => {
      const sourceTag = c.mastery_source === 'conversation'
        ? '<span class="source-tag tag-conv">via conversa</span>'
        : '<span class="source-tag tag-ai">via IA</span>';
      const lastScore = c.history?.length
        ? c.history[c.history.length - 1].score
        : '—';
      const spark = sparkline(c.history);
      const easePct = Math.min(((c.ease_factor - 1.3) / (4.0 - 1.3)) * 100, 100).toFixed(0);
      return `
        <div class="concept-card">
          <div class="concept-name">${pretty(c.concept_id)}</div>
          <div class="concept-tags">${sourceTag}</div>
          <div class="sparkline-wrap" title="Histórico de scores">${spark}</div>
          <div class="concept-footer">
            Último score: <strong>${lastScore}/100</strong>
            &nbsp;·&nbsp; intervalo: <strong>${c.interval_days}d</strong>
            <div style="margin-top:.4rem;font-size:.7rem">ease factor ${c.ease_factor.toFixed(2)}</div>
            <div class="ease-bar-wrap">
              <div class="ease-bar" style="width:${easePct}%"></div>
            </div>
          </div>
        </div>`;
    }).join('');

    document.getElementById('concepts-content').innerHTML =
      `<div class="concepts-grid">${cards}</div>`;
  }

  // ── render lessons ────────────────────────────────────────────────
  function renderLessons(lessons) {
    if (lessons.length === 0) {
      document.getElementById('lessons-content').innerHTML =
        '<div class="empty">Nenhuma lição completada ainda.</div>';
      return;
    }

    const sorted = [...lessons].sort((a, b) =>
      new Date(b.completed_at) - new Date(a.completed_at));

    const rows = sorted.map(l => {
      const bar = `<div class="mini-bar" style="width:${l.final_score}%;background:${scoreColor(l.final_score)}"></div>`;
      return `
        <tr>
          <td><span class="lesson-name">${l.lesson_id}</span></td>
          <td class="date-cell">${formatDate(l.completed_at)}</td>
          <td>
            <div class="score-cell">
              <div class="mini-bar-wrap">${bar}</div>
              <span class="score-num" style="color:${scoreColor(l.final_score)}">${l.final_score}</span>
            </div>
          </td>
        </tr>`;
    }).join('');

    document.getElementById('lessons-content').innerHTML = `
      <table class="lesson-table">
        <thead>
          <tr>
            <th>Lição</th>
            <th>Data</th>
            <th>Score</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // ── main load ─────────────────────────────────────────────────────
  async function load() {
    try {
      const res  = await fetch(`${SERVER}/api/progress`, { signal: AbortSignal.timeout(3000) });
      const data = await res.json();

      document.getElementById('offline-banner').style.display = 'none';
      document.getElementById('last-updated').textContent =
        'Atualizado às ' + new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

      renderSummary(data);
      renderReviews(data.concepts);
      renderConcepts(data.concepts.filter(c => c.mastered));
      renderLessons(data.lessons);

    } catch {
      document.getElementById('offline-banner').style.display = 'block';
      document.getElementById('last-updated').textContent = 'offline';
      document.getElementById('summary-row').innerHTML =
        '<div class="empty" style="width:100%">Servidor indisponível</div>';
      ['reviews-content','concepts-content','lessons-content'].forEach(id => {
        document.getElementById(id).innerHTML =
          '<div class="empty">Sem dados — servidor offline</div>';
      });
    }
  }

  load();
</script>
</body>
</html>
